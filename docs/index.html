<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R-Cabinet アップローダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>R-Cabinet アップローダー</h1>

    <!-- ログイン画面 -->
    <div id="loginScreen">
      <section class="section" id="gasUrlSection">
        <label for="gasUrl">GAS Web App URL:</label>
        <div class="input-row">
          <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
          <button id="saveUrl">保存</button>
        </div>
      </section>

      <section class="section">
        <label for="loginShopId">ショップID:</label>
        <input type="text" id="loginShopId" placeholder="ショップID">
        <label for="loginPassword" style="margin-top:8px">パスワード:</label>
        <input type="password" id="loginPassword" placeholder="パスワード">
        <button id="loginBtn" style="width:100%;margin-top:12px">ログイン</button>
        <p id="loginError" style="color:#e00;margin-top:8px;display:none"></p>
      </section>
    </div>

    <!-- メイン画面（ログイン後） -->
    <div id="mainScreen" hidden>
      <!-- ヘッダー -->
      <div class="header-bar">
        <span id="shopNameDisplay"></span>
        <button id="logoutBtn" class="btn-small">ログアウト</button>
      </div>

      <!-- 2カラムレイアウト -->
      <div class="main-layout">
        <!-- 左サイドバー: フォルダツリー -->
        <div class="sidebar">
          <div class="sidebar-header">
            <span>フォルダ</span>
            <button id="refreshFolders" class="btn-small">更新</button>
          </div>
          <div id="folderTree" class="folder-tree">
            <p class="tree-loading">読み込み中...</p>
          </div>
        </div>

        <!-- 右メインエリア -->
        <div class="main-content">
          <!-- ドロップゾーン -->
          <section class="section">
            <div id="dropZone">
              <p>ここに画像をドラッグ&ドロップ<br>またはクリックして選択</p>
              <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </div>
          </section>

          <!-- アップロード待ちリスト -->
          <section class="section" id="queueSection" hidden>
            <h2>アップロード待ち</h2>
            <div id="uploadQueue"></div>
            <button id="startUpload" disabled>アップロード開始</button>
          </section>

          <!-- 進捗 -->
          <div id="progress" hidden>
            <div id="progressBar"><div id="progressFill"></div></div>
            <span id="progressText"></span>
          </div>

          <!-- フォルダ内既存画像 -->
          <section class="section" id="existingSection" hidden>
            <h2 id="existingTitle">フォルダ内の既存画像</h2>
            <div id="existingFiles"></div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
