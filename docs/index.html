<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R-Cabinet アップローダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>R-Cabinet アップローダー</h1>

    <!-- ログイン画面 -->
    <div id="loginScreen">
      <section class="section">
        <label for="loginShopId">ショップID:</label>
        <input type="text" id="loginShopId" placeholder="ショップID">
        <label for="loginPassword" style="margin-top:8px">パスワード:</label>
        <input type="password" id="loginPassword" placeholder="パスワード">
        <button id="loginBtn" style="width:100%;margin-top:12px">ログイン</button>
        <div id="loginSpinner" class="spinner-wrap" style="display:none">
          <div class="spinner"></div>
          <span>ログイン中...</span>
        </div>
        <p id="loginError" style="color:#e00;margin-top:8px;display:none"></p>
      </section>
    </div>

    <!-- メイン画面（ログイン後） -->
    <div id="mainScreen" hidden>
      <!-- ヘッダー -->
      <div class="header-bar">
        <span id="shopNameDisplay"></span>
        <button id="logoutBtn" class="btn-small">ログアウト</button>
      </div>

      <!-- 2カラムレイアウト -->
      <div class="main-layout">
        <!-- 左サイドバー: フォルダツリー -->
        <div class="sidebar">
          <div class="sidebar-header">
            <span>フォルダ</span>
            <button id="refreshFolders" class="btn-small">更新</button>
          </div>
          <div id="folderTree" class="folder-tree">
            <p class="tree-loading">読み込み中...</p>
          </div>
        </div>

        <!-- 右メインエリア -->
        <div class="main-content">
          <!-- ドロップゾーン -->
          <section class="section">
            <div id="dropZone">
              <p>ここに画像をドラッグ&ドロップ<br>またはクリックして選択</p>
              <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </div>
          </section>

          <!-- アップロード待ちリスト -->
          <section class="section" id="queueSection" hidden>
            <h2>アップロード待ち</h2>
            <div id="uploadQueue"></div>
            <button id="startUpload" disabled>アップロード開始</button>
          </section>

          <!-- 進捗 -->
          <div id="progress" hidden>
            <div id="progressBar"><div id="progressFill"></div></div>
            <span id="progressText"></span>
          </div>

          <!-- フォルダ内既存画像 -->
          <section class="section" id="existingSection" hidden>
            <div class="files-header">
              <span id="filesCount"></span>
              <div class="files-controls">
                <label>並べ替え:
                  <select id="sortSelect">
                    <option value="date_desc">登録日の新しい順</option>
                    <option value="date_asc">登録日の古い順</option>
                    <option value="name_asc">画像名 昇順</option>
                    <option value="name_desc">画像名 降順</option>
                    <option value="path_asc">ファイル名 昇順</option>
                    <option value="path_desc">ファイル名 降順</option>
                    <option value="size_desc">サイズ 大きい順</option>
                    <option value="size_asc">サイズ 小さい順</option>
                  </select>
                </label>
                <label>表示:
                  <select id="limitSelect">
                    <option value="20">20件</option>
                    <option value="40">40件</option>
                    <option value="60">60件</option>
                    <option value="80">80件</option>
                    <option value="100">100件</option>
                  </select>
                </label>
              </div>
            </div>
            <div id="pagination" class="pagination"></div>
            <div id="existingFiles"></div>
            <div id="paginationBottom" class="pagination"></div>
          </section>
        </div>

        <!-- 右サイドパネル: 画像詳細 -->
        <div id="imageDetail" class="detail-panel" hidden>
          <div class="detail-panel-header">
            <span>画像詳細</span>
            <span class="detail-close" id="detailClose">&times;</span>
          </div>
          <div class="detail-panel-body">
            <img id="detailPreview" class="detail-preview" src="" alt="">
            <table class="detail-table">
              <tr><th>画像名</th><td id="detailFileName"></td></tr>
              <tr><th>ファイルパス</th><td id="detailFilePath"></td></tr>
              <tr><th>サイズ</th><td id="detailFileSize"></td></tr>
              <tr><th>解像度</th><td id="detailDimensions"></td></tr>
              <tr><th>登録/変更日</th><td id="detailTimeStamp"></td></tr>
              <tr>
                <th>画像URL</th>
                <td>
                  <span id="detailFileUrl" class="detail-url"></span>
                  <button id="copyUrlBtn" class="btn-small" style="margin-top:4px">URLコピー</button>
                </td>
              </tr>
            </table>
          </div>
        </div>
      </div>

      <!-- トースト -->
      <div id="toast" class="toast"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
